<header class="header">
  <div class="shell header__inner">
    <a routerLink="/" class="brand" aria-label="Tres — home">
      <span class="brand__mark" aria-hidden="true">
        <!-- abstract two-tone glyph composed of a circle and a cross -->
        <svg viewBox="0 0 36 36" width="32" height="32">
          <circle cx="13" cy="18" r="9" fill="none" stroke="currentColor" stroke-width="2.4" />
          <path d="M22 9 L33 27 M33 9 L22 27" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round" />
        </svg>
      </span>
      <span class="brand__type">
        <span class="brand__word">Tres</span>
        <span class="brand__sub">a tic-tac-toe study</span>
      </span>
    </a>

    <nav class="nav" aria-label="Primary">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/play" routerLinkActive="is-active">Play</a>
      <a routerLink="/result" routerLinkActive="is-active">Scores</a>
    </nav>
  </div>
</header>
