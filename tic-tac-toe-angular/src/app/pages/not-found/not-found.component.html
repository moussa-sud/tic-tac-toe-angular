<section class="lost shell">
  <div class="lost__inner">
    <span class="eyebrow">Error · Off the board</span>

    <h1 class="lost__title">
      <span aria-hidden="true">4</span>
      <svg class="lost__zero" viewBox="0 0 200 200" aria-hidden="true">
        <!-- a stylized O drawn in two arcs, with a diagonal "miss" strike -->
        <circle cx="100" cy="100" r="74" fill="none" stroke="currentColor" stroke-width="10" stroke-linecap="round"/>
        <path d="M40 160 L160 40" stroke="var(--accent)" stroke-width="6" stroke-linecap="round" stroke-dasharray="8 10"/>
      </svg>
      <span aria-hidden="true">4</span>
      <span class="visually-hidden">Page not found</span>
    </h1>

    <p class="lost__lede">
      An <em>illegal move</em>. This page isn't on the grid —
      perhaps it was played on a board that no longer exists.
    </p>

    <div class="lost__actions">
      <app-button variant="primary" (press)="goHome()">Return home</app-button>
      <app-button variant="outline" (press)="play()">Start a new round</app-button>
    </div>
  </div>
</section>
